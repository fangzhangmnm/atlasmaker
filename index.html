<!doctype html>
<html lang="zh-CN" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#F6F4EF" />
    <meta name="theme-color" content="#121110" media="(prefers-color-scheme: dark)" />
    <script>
      // Theme guard
      (function () {
        try {
          var saved = localStorage.getItem("atlasmaker.theme");
          if (saved === "day" || saved === "night" || saved === "auto") {
            document.documentElement.setAttribute("data-theme", saved);
          }
        } catch (_) {}
      })();
      // PC 也兜个底：任何脚本错误顶上糊一条红条
      (function () {
        function show(text) {
          var bar = document.getElementById("__errBar");
          if (!bar) {
            bar = document.createElement("div");
            bar.id = "__errBar";
            bar.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:9999;padding:8px 12px;background:#c0392b;color:#fff;font:13px/1.4 system-ui;white-space:pre-wrap;word-break:break-word;max-height:50vh;overflow:auto";
            bar.addEventListener("click", function () { bar.remove(); });
            (document.body || document.documentElement).appendChild(bar);
          }
          bar.textContent = "⚠ " + text + "  (点击关闭)";
        }
        window.__am_showFatal = show;
        window.addEventListener("error", function (e) {
          var m = (e && e.message) || (e && e.error && (e.error.message || String(e.error))) || "脚本错误";
          var src = e && e.filename ? " (" + e.filename.split("/").pop() + ":" + e.lineno + ")" : "";
          show(m + src);
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e && e.reason;
          show((r && r.message) || String(r || "promise rejection"));
        });
      })();
    </script>
    <meta name="color-scheme" content="light dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AtlasMaker" />
    <title>AtlasMaker</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles.css" />
    <!-- 版本号 SSoT：早于 app.js，给 window.ATLASMAKER_VERSION -->
    <script src="./src/version.js"></script>
  </head>
  <body>
    <!-- 无限工作台。pan/zoom 直接作用在 #world 的 transform 上。
         所有对象（图片、viewport）作为绝对定位的子节点，坐标是「世界单位」。 -->
    <div id="board" class="board">
      <div id="world" class="world"></div>
      <!-- overlay 用 div，里面画选框 + 4 个角把手；屏幕 px，永远清晰 -->
      <div id="overlay" class="overlay"></div>
    </div>

    <!-- 顶栏 -->
    <header class="top-bar" id="topBar">
      <input id="sessionName" class="session-name" type="text" value="未命名" placeholder="未命名" aria-label="会话名" />
      <span id="saveStatus" class="save-status" title="自动保存到本地（Ctrl+S 立即）">已保存</span>
      <div class="tool-group" role="group" aria-label="工具">
        <button class="tool" id="toolSelect" type="button" data-tool="select" aria-pressed="true" title="选择 (V)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 3l14 8-6 2-2 6L5 3z"></path>
          </svg>
        </button>
        <button class="tool" id="toolHand" type="button" data-tool="hand" title="平移 (H / Space)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 11V6a2 2 0 0 0-4 0v5"></path>
            <path d="M14 10V4a2 2 0 0 0-4 0v6"></path>
            <path d="M10 10.5V6a2 2 0 0 0-4 0v9"></path>
            <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-1-5.6-2.8l-3.4-5.4a2 2 0 0 1 3.4-2L8 14"></path>
          </svg>
        </button>
        <button class="tool" id="toolViewport" type="button" data-tool="viewport" title="新建 viewport（拖框框出输出范围，R）">
          <!-- 虚线框 + 角标，区别于「实心矩形」 -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 8V5h3M20 8V5h-3M4 16v3h3M20 16v3h-3" />
            <path d="M11 12h2" />
            <path d="M12 11v2" />
          </svg>
        </button>
      </div>

      <button class="tool" id="fitButton" type="button" title="适应所有 (0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="1"></rect>
          <path d="M3 8h4M3 16h4M8 3v4M16 3v4M3 8L8 3M3 16l5 5M21 8L16 3M21 16l-5 5"></path>
        </svg>
      </button>

      <div class="spacer"></div>

      <button class="btp-pill" id="btpPill" type="button" title="Blender 连接状态（点击重试）">
        <span class="btp-dot" aria-hidden="true"></span>
        <span class="btp-label" id="btpLabel">Blender</span>
      </button>

      <button class="btp-pill" id="cloudPill" type="button" title="OneDrive（点击登录 / 注销）">
        <span class="btp-dot" aria-hidden="true"></span>
        <span class="btp-label" id="cloudLabel">OneDrive</span>
      </button>
      <button class="tool" id="cloudPushBtn" type="button" title="推到 OneDrive（覆盖云端）" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 10h-1.3A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
          <polyline points="8 13 12 9 16 13"></polyline>
          <line x1="12" y1="9" x2="12" y2="17"></line>
        </svg>
      </button>
      <button class="tool" id="cloudPullBtn" type="button" title="从 OneDrive 拉（用云端覆盖本地）" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18 10h-1.3A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
          <polyline points="8 13 12 17 16 13"></polyline>
          <line x1="12" y1="17" x2="12" y2="9"></line>
        </svg>
      </button>

      <button class="tool" id="sessionsButton" type="button" title="会话浏览（多 session + 子文件夹）">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"></path>
        </svg>
      </button>
      <input id="importFile" type="file" accept=".zip,application/zip" hidden />

      <button class="tool" id="hamburgerBtn" type="button" title="更多" aria-haspopup="menu" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="4" y1="7"  x2="20" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="20" y2="17"></line>
        </svg>
      </button>
    </header>

    <!-- 汉堡下拉菜单（不常用的功能塞这里） -->
    <div id="hamburgerMenu" class="dropdown-menu hidden" role="menu" aria-label="更多操作">
      <button class="menu-item" id="menuTheme" type="button" role="menuitem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span id="menuThemeLabel">主题：自动</span>
      </button>
      <div class="menu-sep" role="separator"></div>
      <button class="menu-item" id="menuImport" type="button" role="menuitem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <span>导入 atlas zip…</span>
      </button>
      <button class="menu-item" id="menuExport" type="button" role="menuitem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span>导出当前 atlas zip</span>
      </button>
    </div>

    <!-- HUD -->
    <div class="hud" id="hud">
      <span id="zoomLabel">100%</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="countLabel">0 项</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="statusLabel">空白工作台 — Ctrl+V 粘贴图片</span>
      <span class="sep" aria-hidden="true">·</span>
      <span id="versionLabel" class="version">v?</span>
    </div>

    <!-- viewport 属性浮窗（选中 viewport 时显示） -->
    <div id="viewportPanel" class="float-panel hidden" role="dialog" aria-label="viewport 属性">
      <div class="float-panel-head">
        <span class="float-panel-title">Viewport</span>
        <button id="viewportPanelClose" class="close-x" type="button" aria-label="关闭">×</button>
      </div>
      <div class="float-panel-body">
        <label class="row"><span class="row-label">分辨率</span>
          <input id="vpResW" type="number" min="1" max="8192" step="1" value="1024" />
          <span class="row-sep">×</span>
          <input id="vpResH" type="number" min="1" max="8192" step="1" value="1024" />
          <button id="vpLock" class="lock-btn" type="button" aria-pressed="false" title="锁定 viewport：禁止拖 / 转 / 缩">🔓</button>
        </label>
        <label class="row"><span class="row-label">插值</span>
          <select id="vpInterp">
            <option value="linear">线性（默认）</option>
            <option value="nearest">最近（像素画）</option>
          </select>
        </label>
        <label class="row"><span class="row-label">绑定</span>
          <input id="vpBinding" type="text" list="btpTextureList" placeholder="Blender texture 名（留空 = 不绑）" autocomplete="off" />
          <datalist id="btpTextureList"></datalist>
        </label>
        <div class="row">
          <button class="sheet-action" id="vpPush" type="button" title="按当前 binding 推送：存在就 PUT 覆盖，不存在就 POST 新建">推到 Blender</button>
        </div>
        <div class="row z-row">
          <button class="z-btn" id="vpZTop" type="button" title="顶层 (Ctrl+Shift+])">⤒</button>
          <button class="z-btn" id="vpZUp" type="button" title="上移 (Ctrl+])">↑</button>
          <button class="z-btn" id="vpZDown" type="button" title="下移 (Ctrl+[)">↓</button>
          <button class="z-btn" id="vpZBottom" type="button" title="底层 (Ctrl+Shift+[)">⤓</button>
        </div>
        <div class="row">
          <button class="sheet-action" id="vpExport" type="button">导出 PNG</button>
          <button class="sheet-action" id="vpCopy" type="button">复制到剪贴板</button>
        </div>
        <div class="row">
          <button class="sheet-action ghost" id="vpDelete" type="button">删除</button>
        </div>
      </div>
    </div>

    <!-- 图片属性浮窗 -->
    <div id="imagePanel" class="float-panel hidden" role="dialog" aria-label="图片属性">
      <div class="float-panel-head">
        <span class="float-panel-title">图片</span>
        <button id="imagePanelClose" class="close-x" type="button" aria-label="关闭">×</button>
      </div>
      <div class="float-panel-body">
        <div class="row">
          <span class="row-label">原图</span>
          <span id="imgNaturalLabel" class="row-value">—</span>
        </div>
        <div class="row">
          <span class="row-label">锁定</span>
          <button id="imgLock" class="lock-btn" type="button" aria-pressed="false" title="锁定图片：禁止拖 / 转 / 缩">🔓</button>
        </div>
        <label class="row"><span class="row-label">插值</span>
          <select id="imgInterp">
            <option value="linear">线性（默认）</option>
            <option value="nearest">最近（像素画）</option>
          </select>
        </label>
        <div class="row z-row">
          <button class="z-btn" id="imgZTop" type="button" title="顶层 (Ctrl+Shift+])">⤒</button>
          <button class="z-btn" id="imgZUp" type="button" title="上移 (Ctrl+])">↑</button>
          <button class="z-btn" id="imgZDown" type="button" title="下移 (Ctrl+[)">↓</button>
          <button class="z-btn" id="imgZBottom" type="button" title="底层 (Ctrl+Shift+[)">⤓</button>
        </div>
        <div class="row">
          <button class="sheet-action ghost" id="imgDelete" type="button">删除</button>
        </div>
      </div>
    </div>

    <!-- 短 toast：操作结果反馈 -->
    <div id="actionToast" class="toast hidden" role="status" aria-live="polite">
      <span id="actionToastText"></span>
    </div>

    <!-- 会话浏览模态 -->
    <div id="sessionsBackdrop" class="backdrop hidden" aria-hidden="true"></div>
    <div id="sessionsModal" class="sessions-modal hidden" role="dialog" aria-label="会话列表">
      <div class="sessions-head">
        <span class="sessions-title">会话</span>
        <button id="sessionsNewBtn" class="sheet-action" type="button">新建</button>
        <button id="sessionsRefreshBtn" class="sheet-action ghost" type="button" title="重新加载列表">↻</button>
        <div class="spacer"></div>
        <button id="sessionsCloseBtn" class="close-x" type="button" aria-label="关闭">×</button>
      </div>
      <div class="sessions-hint">
        路径里加 <code>/</code> 自动归到子文件夹（如 <code>characters/wall</code>）。
      </div>
      <div id="sessionsList" class="sessions-list"></div>
    </div>

    <!-- 更新 toast -->
    <div id="updateToast" class="toast hidden" role="status" aria-live="polite">
      <span>有新版本</span>
      <button id="updateReloadButton" type="button">刷新</button>
      <button id="updateDismissButton" type="button" class="dismiss" aria-label="忽略">×</button>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
